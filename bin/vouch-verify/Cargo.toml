[package]
name = "vouch-verify"
version = "0.1.0"
edition = "2021"
rust-version = "1.88"
license = "MIT"
authors = ["Pablo M. Suarez <suarezpm@csnat.unt.edu.ar>"]
description = "VOUCH offline verifier — CLI for evidence packet verification"

[[bin]]
name = "vouch-verify"
path = "src/main.rs"

[dependencies]
vouch-chain = { path = "../../crates/vouch-chain" }
vouch-evidence = { path = "../../crates/vouch-evidence" }
vouch-receipt = { path = "../../crates/vouch-receipt" }
vouch-gate = { path = "../../crates/vouch-gate" }
themis-evidence = { path = "../../crates/themis-evidence" }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
chrono = { version = "0.4", default-features = false, features = ["serde", "clock"] }
blake3 = "1"
ed25519-dalek = "2"
hex = "0.4"
base64 = "0.22"

[dev-dependencies]
proptest = "1"
tempfile = "3"
