name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'

# Minimal default; the analyze job widens only the scopes CodeQL needs.
# (Pattern copied from apohara-agentguard, which has this workflow green.)
permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          languages: rust

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@4e828ff8d448a5a5b0e9eb5cc3e7d2c4b5b8c2c5 # v3
        with:
          category: /language:rust
