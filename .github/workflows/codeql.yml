name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 7 * * 1'

# Rust is in PUBLIC PREVIEW for CodeQL — the analyze step
# builds the rust workspace from source to extract the AST,
# which can take >30 min on a 6-crate workspace. We set
# build-mode: 'none' so CodeQL analyzes the Rust source files
# without compiling — this is the official public-preview
# recommendation and produces SARIF results in <5 min.
#
# (The full source-level security review is the goal; we
# accept the trade-off of not having dataflow taint-tracking
# through macro expansions during public preview.)
permissions: {}

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: github/codeql-action/init@github/codeql-action/init@v3
        with:
          languages: rust
          build-mode: none
          queries: security-extended
      - uses: github/codeql-action/analyze@github/codeql-action/analyze@v3
        with:
          category: /language:rust
          upload: always
